<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Geometry Dash Platformer ++ avec Pics</title>
<style>
    body {
        margin: 0;
        background: #0a0f1a;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
    }
    #game {
        display: block;
        margin: auto;
        background: #071026;
    }
    #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>
<div id="ui">Score : 0</div>

<script>
console.log("Script chargé.");

/* ============================
   CANVAS
============================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

/* ============================
   PLAYER
============================ */
const player = {
    x: 120,
    y: 300,
    size: 30,
    vy: 0,
    onGround: false
};

/* ============================
   GAME VARIABLES
============================ */
let gravity = 0.8;
let speed = 6;
let score = 0;
let blocks = [];
let spikes = [];
let gameOver = false;

/* ============================
   INPUT
============================ */
function jump() {
    if (player.onGround && !gameOver) {
        player.vy = -16;
        player.onGround = false;
    }
    if (gameOver) restart();
}

window.onkeydown = e => {
    if (e.code === "Space") jump();
};
canvas.onclick = jump;

/* ============================
   BLOCK GENERATION
============================ */
function spawnBlock() {
    const type = Math.random();

    let w = 60 + Math.random() * 80;
    let h = 40 + Math.random() * 60;

    let y = 350;

    // escaliers
    if (type < 0.4) {
        y -= Math.floor(Math.random() * 4) * 40; // 0, 40, 80, 120
    }

    blocks.push({
        x: 900,
        y,
        w,
        h
    });
}

/* ============================
   SPIKE GENERATION
============================ */
function spawnSpike() {
    const size = 40;
    const y = 350; // au sol

    spikes.push({
        x: 900,
        y,
        size
    });
}

/* ============================
   COLLISION SOLIDE
============================ */
function resolveCollision(p, b) {
    if (
        p.x < b.x + b.w &&
        p.x + p.size > b.x &&
        p.y < b.y + b.h &&
        p.y + p.size > b.y
    ) {
        const overlapLeft = (p.x + p.size) - b.x;
        const overlapRight = (b.x + b.w) - p.x;
        const overlapTop = (p.y + p.size) - b.y;
        const overlapBottom = (b.y + b.h) - p.y;

        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

        if (minOverlap === overlapTop && p.vy >= 0) {
            p.y = b.y - p.size;
            p.vy = 0;
            p.onGround = true;
        }
        else if (minOverlap === overlapLeft) {
            p.x = b.x - p.size;
        }
        else if (minOverlap === overlapRight) {
            p.x = b.x + b.w;
        }
        else if (minOverlap === overlapBottom) {
            p.y = b.y + b.h;
            p.vy = 2;
        }
    }
}

/* ============================
   SPIKE COLLISION (MORTELLE)
============================ */
function spikeCollision(p, s) {
    if (
        p.x < s.x + s.size &&
        p.x + p.size > s.x &&
        p.y < s.y + s.size &&
        p.y + p.size > s.y
    ) {
        return true;
    }
    return false;
}

/* ============================
   RESTART
============================ */
function restart() {
    console.log("Restart du jeu.");
    blocks = [];
    spikes = [];
    score = 0;
    speed = 6;
    player.y = 300;
    player.vy = 0;
    player.onGround = false;
    gameOver = false;
    loop();
}

/* ============================
   DRAW PLAYER
============================ */
function drawPlayer() {
    ctx.fillStyle = "#00eaff";
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x, player.y + player.size);
    ctx.lineTo(player.x + player.size, player.y + player.size / 2);
    ctx.closePath();
    ctx.fill();
}

/* ============================
   DRAW BLOCK
============================ */
function drawBlock(b) {
    ctx.fillStyle = "#ff3c7d";
    ctx.fillRect(b.x, b.y, b.w, b.h);
}

/* ============================
   DRAW SPIKE
============================ */
function drawSpike(s) {
    ctx.fillStyle = "#ffdd55";
    ctx.beginPath();
    ctx.moveTo(s.x, s.y + s.size);
    ctx.lineTo(s.x + s.size / 2, s.y);
    ctx.lineTo(s.x + s.size, s.y + s.size);
    ctx.closePath();
    ctx.fill();
}

/* ============================
   BACKGROUND
============================ */
let bgOffset = 0;
function drawBackground() {
    bgOffset -= speed * 0.2;
    ctx.fillStyle = "#0a0f1a";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#112";
    for (let i = 0; i < 20; i++) {
        let x = (i * 200 + bgOffset) % (W + 200) - 200;
        ctx.fillRect(x, H - 200, 150, 200);
    }
}

/* ============================
   MAIN LOOP
============================ */
function loop() {
    if (gameOver) return;

    ctx.clearRect(0, 0, W, H);

    drawBackground();

    // physics
    player.vy += gravity;
    player.y += player.vy;
    player.onGround = false;

    // sol
    if (player.y > 350) {
        player.y = 350;
        player.vy = 0;
        player.onGround = true;
    }

    // spawn blocks & spikes
    if (Math.random() < 0.03) spawnBlock();
    if (Math.random() < 0.02) spawnSpike();

    // move + draw blocks
    blocks.forEach(b => {
        b.x -= speed;
        drawBlock(b);
        resolveCollision(player, b);
    });

    blocks = blocks.filter(b => b.x + b.w > 0);

    // move + draw spikes
    spikes.forEach(s => {
        s.x -= speed;
        drawSpike(s);
        if (spikeCollision(player, s)) {
            gameOver = true;
        }
    });

    spikes = spikes.filter(s => s.x + s.size > 0);

    drawPlayer();

    score += 0.1;
    document.getElementById("ui").textContent = "Score : " + Math.floor(score);

    speed += 0.002;

    requestAnimationFrame(loop);
}

console.log("Démarrage du jeu.");
loop();
</script>

</body>
</html>
