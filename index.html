<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Geometry Dash – Triangle ++</title>
<style>
  body{
    margin:0;
    background:#050812;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:#fff;
  }
  #game{
    display:block;
    margin:0 auto;
    background:#071026;
  }
  #ui{
    position:fixed;
    top:10px;
    left:10px;
    font-size:18px;
    font-weight:bold;
  }
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>
<div id="ui">Score : 0</div>

<script>
/* ============================
   CANVAS
============================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;

/* ============================
   PLAYER
============================ */
const player = {
  x: 120,
  y: H - 120,
  size: 30,
  vy: 0,
  onGround: false,
  angle: 0
};

/* ============================
   GAME VARIABLES
============================ */
let gravity = 0.8;
let speed = 6;
let score = 0;
let blocks = [];      // blocs fixes + mobiles
let spikes = [];
let portals = [];
let gameOver = false;
let deathTimer = 0;
let particles = [];
let gravitySign = 1;  // 1 = sol, -1 = plafond

/* ============================
   INPUT
============================ */
function jump() {
  if (!gameOver && player.onGround) {
    player.vy = -16 * gravitySign;
    player.onGround = false;
  } else if (gameOver && deathTimer <= 0) {
    restart();
  }
}

window.addEventListener("keydown", e => {
  if (e.code === "Space") {
    e.preventDefault();
    jump();
  }
});
canvas.addEventListener("click", jump);

/* ============================
   SPAWN BLOCS (fixes + mobiles)
============================ */
function spawnBlock() {
  const type = Math.random();
  let w = 60 + Math.random() * 80;
  let h = 40 + Math.random() * 60;
  let y = H - 120;

  if (type < 0.5) {
    y -= Math.floor(Math.random() * 3) * 40; // escaliers
  }

  const isMoving = type > 0.7; // ~30% mobiles
  const moveAmp = isMoving ? 30 + Math.random()*30 : 0;
  const moveSpeed = isMoving ? 0.02 + Math.random()*0.03 : 0;
  const phase = Math.random()*Math.PI*2;

  blocks.push({
    x: W + 50,
    baseY: y,
    y,
    w,
    h,
    moving: isMoving,
    amp: moveAmp,
    ms: moveSpeed,
    phase
  });
}

/* ============================
   SPAWN PICS
============================ */
function spawnSpike() {
  const size = 40;
  const y = H - 120;
  spikes.push({ x: W + 50, y, size });
}

/* ============================
   SPAWN PORTAILS (gravité)
============================ */
function spawnPortal() {
  const y = H - 160;
  portals.push({
    x: W + 50,
    y,
    w: 30,
    h: 80,
    used: false
  });
}

/* ============================
   COLLISION BLOCS (SOLIDES + MORT LATÉRALE)
============================ */
function resolveBlockCollision(p, b) {
  if (
    p.x < b.x + b.w &&
    p.x + p.size > b.x &&
    p.y < b.y + b.h &&
    p.y + p.size > b.y
  ) {
    const overlapLeft = (p.x + p.size) - b.x;
    const overlapRight = (b.x + b.w) - p.x;
    const overlapTop = (p.y + p.size) - b.y;
    const overlapBottom = (b.y + b.h) - p.y;

    const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

    // atterrissage sur le bloc (en fonction de la gravité)
    if (minOverlap === overlapTop && p.vy * gravitySign >= 0) {
      p.y = b.y - p.size;
      p.vy = 0;
      p.onGround = true;
    }
    // collision côté gauche → mort
    else if (minOverlap === overlapLeft) {
      triggerDeath();
    }
    // collision côté droit → mort
    else if (minOverlap === overlapRight) {
      triggerDeath();
    }
    // collision par dessous
    else if (minOverlap === overlapBottom) {
      p.y = b.y + b.h;
      p.vy = 2 * gravitySign;
    }
  }
}

/* ============================
   COLLISION PICS (MORTELLE)
============================ */
function spikeHit(p, s) {
  return (
    p.x < s.x + s.size &&
    p.x + p.size > s.x &&
    p.y < s.y + s.size &&
    p.y + p.size > s.y
  );
}

/* ============================
   COLLISION PORTAILS (GRAVITÉ)
============================ */
function portalHit(p, portal) {
  return (
    p.x < portal.x + portal.w &&
    p.x + p.size > portal.x &&
    p.y < portal.y + portal.h &&
    p.y + p.size > portal.y
  );
}

/* ============================
   DEATH ANIMATION
============================ */
function triggerDeath() {
  if (gameOver) return;
  gameOver = true;
  deathTimer = 60; // frames
  spawnDeathParticles();
}

function spawnDeathParticles() {
  particles = [];
  for (let i = 0; i < 40; i++) {
    particles.push({
      x: player.x + player.size/2,
      y: player.y + player.size/2,
      vx: (Math.random()*2-1)*6,
      vy: (Math.random()*2-1)*6,
      life: 40 + Math.random()*20
    });
  }
}

/* ============================
   RESTART
============================ */
function restart() {
  blocks = [];
  spikes = [];
  portals = [];
  particles = [];
  score = 0;
  speed = 6;
  gravity = 0.8;
  gravitySign = 1;
  player.x = 120;
  player.y = H - 120;
  player.vy = 0;
  player.onGround = false;
  player.angle = 0;
  gameOver = false;
  deathTimer = 0;
  requestAnimationFrame(loop);
}

/* ============================
   DRAW PLAYER
============================ */
function drawPlayer() {
  ctx.save();
  ctx.translate(player.x + player.size/2, player.y + player.size/2);
  ctx.rotate(player.angle);
  ctx.translate(-player.size/2, -player.size/2);

  ctx.fillStyle = "#00eaff";
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, player.size);
  ctx.lineTo(player.size, player.size/2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

/* ============================
   DRAW BLOCK
============================ */
function drawBlock(b) {
  ctx.fillStyle = "#ff3c7d";
  ctx.fillRect(b.x, b.y, b.w, b.h);
}

/* ============================
   DRAW SPIKE
============================ */
function drawSpike(s) {
  ctx.fillStyle = "#ffdd55";
  ctx.beginPath();
  ctx.moveTo(s.x, s.y + s.size);
  ctx.lineTo(s.x + s.size / 2, s.y);
  ctx.lineTo(s.x + s.size, s.y + s.size);
  ctx.closePath();
  ctx.fill();
}

/* ============================
   DRAW PORTAL
============================ */
function drawPortal(p) {
  ctx.strokeStyle = "#7b5cff";
  ctx.lineWidth = 3;
  ctx.strokeRect(p.x, p.y, p.w, p.h);
  ctx.fillStyle = "rgba(123,92,255,0.2)";
  ctx.fillRect(p.x, p.y, p.w, p.h);
}

/* ============================
   DRAW PARTICLES
============================ */
function drawParticles() {
  particles.forEach(pt => {
    ctx.fillStyle = "#00eaff";
    ctx.fillRect(pt.x, pt.y, 4, 4);
  });
}

/* ============================
   BACKGROUND
============================ */
let bgOffset = 0;
function drawBackground() {
  bgOffset -= speed * 0.2;
  ctx.fillStyle = "#050812";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "#101528";
  for (let i = 0; i < 20; i++) {
    let x = (i * 200 + bgOffset) % (W + 200) - 200;
    ctx.fillRect(x, H - 200, 150, 200);
  }
}

/* ============================
   MAIN LOOP
============================ */
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (!gameOver) {
    // physique
    player.vy += gravity * gravitySign;
    player.y += player.vy;
    player.onGround = false;

    // sol / plafond
    if (gravitySign === 1) {
      if (player.y > H - 120) {
        player.y = H - 120;
        player.vy = 0;
        player.onGround = true;
      }
      if (player.y + player.size < 0) triggerDeath();
    } else {
      if (player.y < 70) {
        player.y = 70;
        player.vy = 0;
        player.onGround = true;
      }
      if (player.y > H) triggerDeath();
    }

    // rotation du triangle
    if (!player.onGround) {
      player.angle += 0.25 * gravitySign;
    } else {
      player.angle *= 0.8;
    }

    // spawn
    if (Math.random() < 0.03) spawnBlock();
    if (Math.random() < 0.02) spawnSpike();
    if (Math.random() < 0.005) spawnPortal();

    // blocs
    blocks.forEach(b => {
      b.x -= speed;
      if (b.moving) {
        b.y = b.baseY + Math.sin(performance.now()*b.ms + b.phase)*b.amp;
      }
      drawBlock(b);
      resolveBlockCollision(player, b);
    });
    blocks = blocks.filter(b => b.x + b.w > 0);

    // pics
    spikes.forEach(s => {
      s.x -= speed;
      drawSpike(s);
      if (spikeHit(player, s)) triggerDeath();
    });
    spikes = spikes.filter(s => s.x + s.size > 0);

    // portails
    portals.forEach(p => {
      p.x -= speed;
      drawPortal(p);
      if (!p.used && portalHit(player, p)) {
        p.used = true;
        gravitySign *= -1;
        player.vy = 0;
        // reposition sur sol/plafond
        if (gravitySign === -1) {
          player.y = 80;
        } else {
          player.y = H - 120;
        }
      }
    });
    portals = portals.filter(p => p.x + p.w > 0);

    // score & difficulté
    score += 0.1;
    speed += 0.002;
  } else {
    // animation de mort
    deathTimer--;
    particles.forEach(pt => {
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vy += 0.2;
      pt.life--;
    });
    particles = particles.filter(pt => pt.life > 0);

    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "#fff";
    ctx.font = "28px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Mort ! Clique ou Espace pour recommencer", W/2, H/2);
  }

  // dessin joueur / particules
  if (!gameOver) drawPlayer();
  drawParticles();

  // HUD
  document.getElementById("ui").textContent = "Score : " + Math.floor(score);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
