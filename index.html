<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Geometry Dash – Triangle, Blocs et Pics</title>
<style>
  body {
    margin: 0;
    background: #050812;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: #fff;
  }
  #game {
    display: block;
    margin: 0 auto;
    background: #071026;
  }
  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>
<div id="ui">Score : 0</div>

<script>
/* ============================
   CANVAS
============================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;

/* ============================
   PLAYER
============================ */
const player = {
  x: 120,
  y: H - 120,
  size: 30,
  vy: 0,
  onGround: false
};

/* ============================
   GAME VARIABLES
============================ */
let gravity = 0.8;
let speed = 6;
let score = 0;
let blocks = [];
let spikes = [];
let gameOver = false;

/* ============================
   INPUT
============================ */
function jump() {
  if (player.onGround && !gameOver) {
    player.vy = -16;
    player.onGround = false;
  } else if (gameOver) {
    restart();
  }
}

window.addEventListener("keydown", e => {
  if (e.code === "Space") {
    e.preventDefault();
    jump();
  }
});
canvas.addEventListener("click", jump);

/* ============================
   BLOCK GENERATION
============================ */
function spawnBlock() {
  const type = Math.random();
  let w = 60 + Math.random() * 80;
  let h = 40 + Math.random() * 60;
  let y = H - 120;

  // escaliers (blocs plus hauts)
  if (type < 0.5) {
    y -= Math.floor(Math.random() * 3) * 40; // 0, 40, 80
  }

  blocks.push({ x: W + 50, y, w, h });
}

/* ============================
   SPIKE GENERATION
============================ */
function spawnSpike() {
  const size = 40;
  const y = H - 120;
  spikes.push({ x: W + 50, y, size });
}

/* ============================
   COLLISION BLOCS (SOLIDES)
============================ */
function resolveBlockCollision(p, b) {
  if (
    p.x < b.x + b.w &&
    p.x + p.size > b.x &&
    p.y < b.y + b.h &&
    p.y + p.size > b.y
  ) {
    const overlapLeft = (p.x + p.size) - b.x;
    const overlapRight = (b.x + b.w) - p.x;
    const overlapTop = (p.y + p.size) - b.y;
    const overlapBottom = (b.y + b.h) - p.y;

    const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

    // atterrissage sur le bloc
    if (minOverlap === overlapTop && p.vy >= 0) {
      p.y = b.y - p.size;
      p.vy = 0;
      p.onGround = true;
    }
    // collision côté gauche
    else if (minOverlap === overlapLeft) {
      p.x = b.x - p.size;
    }
    // collision côté droit
    else if (minOverlap === overlapRight) {
      p.x = b.x + b.w;
    }
    // collision par dessous
    else if (minOverlap === overlapBottom) {
      p.y = b.y + b.h;
      p.vy = 2;
    }
  }
}

/* ============================
   COLLISION PICS (MORTELLE)
============================ */
function spikeHit(p, s) {
  return (
    p.x < s.x + s.size &&
    p.x + p.size > s.x &&
    p.y < s.y + s.size &&
    p.y + p.size > s.y
  );
}

/* ============================
   RESTART
============================ */
function restart() {
  blocks = [];
  spikes = [];
  score = 0;
  speed = 6;
  player.x = 120;
  player.y = H - 120;
  player.vy = 0;
  player.onGround = false;
  gameOver = false;
  requestAnimationFrame(loop);
}

/* ============================
   DRAW PLAYER
============================ */
function drawPlayer() {
  ctx.fillStyle = "#00eaff";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(player.x, player.y + player.size);
  ctx.lineTo(player.x + player.size, player.y + player.size / 2);
  ctx.closePath();
  ctx.fill();
}

/* ============================
   DRAW BLOCK
============================ */
function drawBlock(b) {
  ctx.fillStyle = "#ff3c7d";
  ctx.fillRect(b.x, b.y, b.w, b.h);
}

/* ============================
   DRAW SPIKE
============================ */
function drawSpike(s) {
  ctx.fillStyle = "#ffdd55";
  ctx.beginPath();
  ctx.moveTo(s.x, s.y + s.size);
  ctx.lineTo(s.x + s.size / 2, s.y);
  ctx.lineTo(s.x + s.size, s.y + s.size);
  ctx.closePath();
  ctx.fill();
}

/* ============================
   BACKGROUND SIMPLE
============================ */
let bgOffset = 0;
function drawBackground() {
  bgOffset -= speed * 0.2;
  ctx.fillStyle = "#050812";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "#101528";
  for (let i = 0; i < 20; i++) {
    let x = (i * 200 + bgOffset) % (W + 200) - 200;
    ctx.fillRect(x, H - 200, 150, 200);
  }
}

/* ============================
   MAIN LOOP
============================ */
function loop() {
  if (gameOver) return;

  ctx.clearRect(0, 0, W, H);
  drawBackground();

  // physique
  player.vy += gravity;
  player.y += player.vy;
  player.onGround = false;

  // sol
  if (player.y > H - 120) {
    player.y = H - 120;
    player.vy = 0;
    player.onGround = true;
  }

  // spawn blocs et pics
  if (Math.random() < 0.03) spawnBlock();
  if (Math.random() < 0.02) spawnSpike();

  // blocs
  blocks.forEach(b => {
    b.x -= speed;
    drawBlock(b);
    resolveBlockCollision(player, b);
  });
  blocks = blocks.filter(b => b.x + b.w > 0);

  // pics
  spikes.forEach(s => {
    s.x -= speed;
    drawSpike(s);
    if (spikeHit(player, s)) {
      gameOver = true;
    }
  });
  spikes = spikes.filter(s => s.x + s.size > 0);

  // joueur
  drawPlayer();

  // score
  score += 0.1;
  document.getElementById("ui").textContent = "Score : " + Math.floor(score);

  // difficulté
  speed += 0.002;

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
