<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Geometry Dash Platformer</title>
<style>
    body {
        margin: 0;
        background: #0a0f1a;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
    }
    #game {
        display: block;
        margin: auto;
        background: linear-gradient(#0a0f1a, #03050a);
    }
    #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>
<div id="ui">Score : 0</div>

<script>
/* ============================
   CANVAS
============================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

/* ============================
   PLAYER
============================ */
const player = {
    x: 120,
    y: H - 120,
    size: 30,
    vy: 0,
    onGround: false
};

/* ============================
   GAME VARIABLES
============================ */
let gravity = 0.8;
let speed = 6;
let score = 0;
let platforms = [];
let gameOver = false;

/* ============================
   INPUT
============================ */
function jump() {
    if (player.onGround && !gameOver) {
        player.vy = -16;
        player.onGround = false;
    }
    if (gameOver) restart();
}

window.onkeydown = e => {
    if (e.code === "Space") jump();
};
canvas.onclick = jump;

/* ============================
   PLATFORM GENERATION
============================ */
function spawnPlatform() {
    const type = Math.random();

    let w = 60 + Math.random() * 80;
    let h = 20;

    let y = H - 120;

    // escaliers
    if (type < 0.33) {
        y -= Math.floor(Math.random() * 3) * 40; // 0, 40 ou 80 px plus haut
    }

    platforms.push({
        x: W + 50,
        y,
        w,
        h
    });
}

/* ============================
   COLLISION AVEC PLATEFORME
============================ */
function checkPlatformCollision(p, plat) {
    // collision horizontale
    if (p.x + p.size < plat.x || p.x > plat.x + plat.w) return false;

    // collision verticale (atterrir dessus)
    if (p.y + p.size <= plat.y && p.y + p.size + p.vy >= plat.y) {
        p.y = plat.y - p.size;
        p.vy = 0;
        p.onGround = true;
        return true;
    }

    return false;
}

/* ============================
   RESTART
============================ */
function restart() {
    platforms = [];
    score = 0;
    speed = 6;
    player.y = H - 120;
    player.vy = 0;
    player.onGround = false;
    gameOver = false;
    loop();
}

/* ============================
   DRAW PLAYER
============================ */
function drawPlayer() {
    ctx.fillStyle = "#00eaff";
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x, player.y + player.size);
    ctx.lineTo(player.x + player.size, player.y + player.size / 2);
    ctx.closePath();
    ctx.fill();
}

/* ============================
   DRAW PLATFORM
============================ */
function drawPlatform(p) {
    ctx.fillStyle = "#ff3c7d";
    ctx.fillRect(p.x, p.y, p.w, p.h);
}

/* ============================
   BACKGROUND PARALLAX
============================ */
let bgOffset = 0;
function drawBackground() {
    bgOffset -= speed * 0.2;
    ctx.fillStyle = "#0a0f1a";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#112";
    for (let i = 0; i < 20; i++) {
        let x = (i * 200 + bgOffset) % (W + 200) - 200;
        ctx.fillRect(x, H - 200, 150, 200);
    }
}

/* ============================
   MAIN LOOP
============================ */
function loop() {
    if (gameOver) return;

    ctx.clearRect(0, 0, W, H);

    drawBackground();

    // physics
    player.vy += gravity;
    player.y += player.vy;
    player.onGround = false;

    // sol
    if (player.y > H - 120) {
        player.y = H - 120;
        player.vy = 0;
        player.onGround = true;
    }

    // spawn platforms
    if (Math.random() < 0.03) spawnPlatform();

    // move + draw platforms
    platforms.forEach(p => {
        p.x -= speed;
        drawPlatform(p);

        if (checkPlatformCollision(player, p)) {
            // atterri sur plateforme
        }

        // collision mortelle sur le côté
        if (
            player.x + player.size > p.x &&
            player.x < p.x + p.w &&
            player.y + player.size > p.y &&
            player.y < p.y + p.h &&
            !player.onGround
        ) {
            gameOver = true;
        }
    });

    // remove off-screen
    platforms = platforms.filter(p => p.x + p.w > 0);

    // draw player
    drawPlayer();

    // score
    score += 0.1;
