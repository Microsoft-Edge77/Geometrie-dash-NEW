<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Test Canvas - Debug Geometry Dash</title>
<style>
  html,body{height:100%;margin:0;background:#0b0f18;display:flex;align-items:center;justify-content:center}
  #gameCanvas{border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,0.6);background:linear-gradient(#071026,#04101a)}
  .info{position:fixed;left:12px;top:12px;color:#fff;font-family:Arial,Helvetica,sans-serif}
</style>
</head>
<body>
<canvas id="gameCanvas" width="1100" height="520"></canvas>
<div class="info">Console: F12 — Vérifie les erreurs si écran noir</div>

<script>
/* ====== Setup DPI-safe canvas ====== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvasForDPR(){
  const dpr = window.devicePixelRatio || 1;
  const cssW = 1100;
  const cssH = 520;
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width = Math.floor(cssW * dpr);
  canvas.height = Math.floor(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // scale drawing operations
}
resizeCanvasForDPR();
window.addEventListener('resize', resizeCanvasForDPR);

/* ====== Simple visual test ====== */
console.log('Initialisation: canvas size', canvas.width, 'x', canvas.height);
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = '#0ff';
ctx.fillRect(20,20,160,100);
ctx.fillStyle = '#ff0';
ctx.font = '20px Arial';
ctx.fillText('Test visuel: rectangle cyan', 24, 60);

/* ====== Minimal game loop test ====== */
let running = true;
let lastTime = performance.now();
let tick = 0;

function loop(now){
  if (!running) return;
  const dt = Math.min(40, now - lastTime);
  lastTime = now;
  tick += dt;

  // clear and draw background gradient
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const g = ctx.createLinearGradient(0,0,0,520);
  g.addColorStop(0,'#071026'); g.addColorStop(1,'#04101a');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,1100,520);

  // moving test rectangle to show animation
  const x = 60 + (tick * 0.12) % 900;
  ctx.fillStyle = '#00f0ff';
  ctx.fillRect(x, 200, 80, 48);

  // draw a triangle player
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.moveTo(140, 260 - 18);
  ctx.lineTo(140, 260 + 18);
  ctx.lineTo(140 + 36, 260);
  ctx.closePath();
  ctx.fill();

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = '18px Arial';
  ctx.fillText('Tick: ' + Math.floor(tick), 18, 28);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ====== Quick error catcher ====== */
window.addEventListener('error', (e) => {
  console.error('Erreur détectée:', e.message, 'à', e.filename + ':' + e.lineno);
  alert('Erreur JS détectée — regarde la console (F12) pour détails.');
});
</script>
</body>
</html>
