<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Geometry Dash - Triangle Runner</title>
<style>
    body {
        margin: 0;
        background: #0a0f1a;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
    }
    #game {
        display: block;
        margin: auto;
        background: linear-gradient(#0a0f1a, #03050a);
    }
    #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>
<div id="ui">Score : 0</div>

<script>
/* ============================
   CANVAS
============================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

/* ============================
   PLAYER
============================ */
const player = {
    x: 120,
    y: H - 120,
    size: 30,
    vy: 0,
    onGround: true
};

/* ============================
   GAME VARIABLES
============================ */
let gravity = 0.8;
let speed = 6;
let score = 0;
let obstacles = [];
let gameOver = false;

/* ============================
   INPUT
============================ */
function jump() {
    if (player.onGround && !gameOver) {
        player.vy = -16;
        player.onGround = false;
    }
    if (gameOver) restart();
}

window.onkeydown = e => {
    if (e.code === "Space") jump();
};
canvas.onclick = jump;

/* ============================
   OBSTACLES
============================ */
function spawnObstacle() {
    const type = Math.random();

    let w, h;

    if (type < 0.33) { 
        // bloc
        w = 40; h = 60;
    } else if (type < 0.66) { 
        // pic
        w = 40; h = 80;
    } else { 
        // double pic
        w = 60; h = 90;
    }

    obstacles.push({
        x: W + 50,
        y: H - 120,
        w,
        h
    });
}

/* ============================
   COLLISION
============================ */
function collide(a, b) {
    return (
        a.x < b.x + b.w &&
        a.x + a.size > b.x &&
        a.y + a.size > b.y &&
        a.y < b.y + b.h
    );
}

/* ============================
   RESTART
============================ */
function restart() {
    obstacles = [];
    score = 0;
    speed = 6;
    player.y = H - 120;
    player.vy = 0;
    player.onGround = true;
    gameOver = false;
    loop();
}

/* ============================
   DRAW PLAYER
============================ */
function drawPlayer() {
    ctx.fillStyle = "#00eaff";
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x, player.y + player.size);
    ctx.lineTo(player.x + player.size, player.y + player.size / 2);
    ctx.closePath();
    ctx.fill();
}

/* ============================
   DRAW OBSTACLES
============================ */
function drawObstacle(o) {
    ctx.fillStyle = "#ff3c7d";
    ctx.fillRect(o.x, o.y, o.w, o.h);
}

/* ============================
   BACKGROUND PARALLAX
============================ */
let bgOffset = 0;
function drawBackground() {
    bgOffset -= speed * 0.2;
    ctx.fillStyle = "#0a0f1a";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#112";
    for (let i = 0; i < 20; i++) {
        let x = (i * 200 + bgOffset) % (W + 200) - 200;
        ctx.fillRect(x, H - 200, 150, 200);
    }
}

/* ============================
   MAIN LOOP
============================ */
function loop() {
    if (gameOver) return;

    ctx.clearRect(0, 0, W, H);

    drawBackground();

    // physics
    player.vy += gravity;
    player.y += player.vy;

    if (player.y > H - 120) {
        player.y = H - 120;
        player.vy = 0;
        player.onGround = true;
    }

    // spawn obstacles
    if (Math.random() < 0.02) spawnObstacle();

    // move + draw obstacles
    obstacles.forEach(o => {
        o.x -= speed;
        drawObstacle(o);

        if (collide(player, o)) {
            gameOver = true;
        }
    });

    // remove off-screen
    obstacles = obstacles.filter(o => o.x + o.w > 0);

    // draw player
    drawPlayer();

    // score
    score += 0.1;
    document.getElementById("ui").textContent = "Score : " + Math.floor(score);

    // difficulty
    speed += 0.002;

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
