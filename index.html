<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Geometry Dash Neon - Triangle avec Musique</title>
<style>
  :root{--neon-a:#00f0ff;--neon-b:#ff4ecf}
  html,body{height:100%;margin:0;background:#000;font-family:Inter,Arial,sans-serif;color:#fff}
  #gameCanvas{display:block;margin:18px auto;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,0.7)}
  .overlay{position:fixed;left:0;right:0;top:12px;text-align:center;pointer-events:none}
  .score{font-weight:800;font-size:20px;color:var(--neon-a);text-shadow:0 0 8px rgba(0,240,255,0.6)}
  .controls{position:fixed;right:18px;top:18px;pointer-events:auto;display:flex;gap:8px;align-items:center}
  .btn{background:linear-gradient(90deg,#111,#222);border:1px solid rgba(255,255,255,0.06);color:#fff;padding:8px 10px;border-radius:8px;cursor:pointer}
  .slider{width:120px}
  .hint{font-size:13px;opacity:0.8}
  .footer{position:fixed;bottom:10px;left:0;right:0;text-align:center;font-size:13px;opacity:0.7}
  @media (max-width:1000px){#gameCanvas{width:92%;height:auto}}
</style>
</head>
<body>
<canvas id="gameCanvas" width="1100" height="520"></canvas>
<div class="overlay">
  <div class="score" id="scoreDisplay">Score: 0</div>
  <div class="hint">Espace / Clic / Tap pour sauter — R pour recommencer</div>
</div>

<div class="controls" id="audioControls">
  <button class="btn" id="toggleMusic">Activer musique</button>
  <input id="volume" class="slider" type="range" min="0" max="1" step="0.01" value="0.6" />
</div>

<div class="footer">Neon Geometry Dash — Triangle</div>

<script>
/* ====== Canvas et jeu (version condensée) ====== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let W = canvas.width, H = canvas.height;
const GROUND_Y = H - 110;
const GRAVITY = 1.05;
const JUMP_VELOCITY = -16;
const INITIAL_SPEED = 6;
const OBSTACLE_INTERVAL_MIN = 800;
const OBSTACLE_INTERVAL_MAX = 1500;

let player, obstacles, spawnTimer, speed, score, running, gameOver, lastTime, bestScore;
let particles = [], bgOffset = 0;

/* ====== Audio Module ====== */
let audioCtx = null;
let masterGain = null;
let musicOn = false;
let audioStarted = false;
let sequencerInterval = null;

/* AUDIO CONFIG */
const TEMPO = 110; // BPM
const STEP_MS = (60 / TEMPO) * 250; // 16th-ish step
const MELODY = [ 440, 0, 523.25, 0, 659.25, 0, 523.25, 0 ]; // A4, silence, C5, ...
const BASS = [110, 110, 82.41, 110, 98, 0, 82.41, 0]; // simple bass pattern

function ensureAudioStarted(){
  if (audioStarted) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = Number(document.getElementById('volume').value || 0.6);
    masterGain.connect(audioCtx.destination);
    audioStarted = true;
    if (musicOn) startSequencer();
  } catch(e){
    console.warn('Audio non supporté', e);
  }
}

function setVolume(v){
  if (masterGain) masterGain.gain.setTargetAtTime(v, audioCtx.currentTime, 0.02);
}

document.getElementById('volume').addEventListener('input', (e)=>{ setVolume(Number(e.target.value)); });
