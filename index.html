<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Geometry Dash Triangle + Musique</title>
<style>
  html,body{margin:0;background:#000;font-family:Arial;color:#fff}
  #gameCanvas{display:block;margin:20px auto;background:#071026;box-shadow:0 0 20px #000}
  .ui{position:fixed;top:10px;left:10px}
  .btn{padding:6px 10px;background:#222;border:1px solid #555;color:#fff;cursor:pointer}
</style>
</head>
<body>

<canvas id="gameCanvas" width="900" height="450"></canvas>

<div class="ui">
  <div id="score">Score: 0</div>
  <button class="btn" id="musicBtn">Activer musique</button>
</div>

<script>
/* ============================
   CANVAS + CONTEXTE
============================ */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

/* ============================
   AUDIO
============================ */
let audioCtx = null;
let masterGain = null;
let musicOn = false;

function startAudio(){
  if(audioCtx) return;
  audioCtx = new AudioContext();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.4;
  masterGain.connect(audioCtx.destination);
}

function playNote(freq){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = freq;
  o.type = "sawtooth";
  g.gain.value = 0.15;
  o.connect(g);
  g.connect(masterGain);
  o.start();
  o.stop(audioCtx.currentTime + 0.2);
}

let musicInterval = null;
function toggleMusic(){
  startAudio();
  musicOn = !musicOn;
  document.getElementById("musicBtn").textContent = musicOn ? "Musique ON" : "Activer musique";

  if(musicOn){
    musicInterval = setInterval(()=>{
      playNote(440);
      setTimeout(()=>playNote(660),120);
    },400);
  } else {
    clearInterval(musicInterval);
  }
}

document.getElementById("musicBtn").onclick = toggleMusic;

/* ============================
   JEU
============================ */
let player = { x:100, y:350, size:30, vy:0, onGround:true };
let obstacles = [];
let speed = 5;
let score = 0;
let lastTime = performance.now();

function jump(){
  startAudio();
  if(player.onGround){
    player.vy = -14;
    player.onGround = false;
  }
}

window.onkeydown = e=>{
  if(e.code==="Space") jump();
};

canvas.onclick = jump;

/* Création obstacles */
function spawnObstacle(){
  obstacles.push({
    x:900,
    y:350,
    w:30,
    h:50
  });
}

/* Collision */
function collide(a,b){
  return a.x < b.x+b.w &&
         a.x+a.size > b.x &&
         a.y < b.y+b.h &&
         a.y+a.size > b.y;
}

/* ============================
   BOUCLE DE JEU
============================ */
function loop(t){
  const dt = t - lastTime;
  lastTime = t;

  // fond
  ctx.fillStyle = "#071026";
  ctx.fillRect(0,0,900,450);

  // gravité
  player.vy += 0.7;
  player.y += player.vy;

  if(player.y > 350){
    player.y = 350;
    player.vy = 0;
    player.onGround = true;
  }

  // obstacles
  if(Math.random() < 0.02){
    spawnObstacle();
  }

  obstacles.forEach(o=>{
    o.x -= speed;
    ctx.fillStyle = "#ff4ecf";
    ctx.fillRect(o.x,o.y,o.w,o.h);

    if(collide(player,o)){
      score = 0;
      obstacles = [];
      speed = 5;
    }
  });

  // triangle joueur
  ctx.fillStyle = "#00f0ff";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(player.x, player.y + player.size);
  ctx.lineTo(player.x + player.size, player.y + player.size/2);
  ctx.closePath();
  ctx.fill();

  // score
  score += dt * 0.01;
  document.getElementById("score").textContent = "Score: " + Math.floor(score);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
