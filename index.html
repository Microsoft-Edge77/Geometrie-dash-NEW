<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Geometry Dash – Triangle ++</title>
<style>
  body{
    margin:0;
    background:#050812;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:#fff;
  }
  #game{
    display:block;
    margin:0 auto;
    background:#071026;
  }
  #ui{
    position:fixed;
    top:10px;
    left:10px;
    font-size:18px;
    font-weight:bold;
  }
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>
<div id="ui">Score : 0</div>

<script>
/* ============================================================
   CANVAS
============================================================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;

/* ============================================================
   PLAYER
============================================================ */
const player = {
  x: 120,
  y: H - 120,
  size: 30,
  vy: 0,
  onGround: false,
  angle: 0
};

/* ============================================================
   GAME VARIABLES
============================================================ */
let gravity = 0.8;
let gravitySign = 1; // 1 = sol, -1 = plafond
let speed = 4.5;     // vitesse lente
let score = 0;

let blocks = [];
let spikes = [];
let portals = [];
let particles = [];

let gameOver = false;
let deathTimer = 0;

/* ============================================================
   INPUT
============================================================ */
function jump() {
  if (!gameOver && player.onGround) {
    player.vy = -16 * gravitySign;
    player.onGround = false;
  } else if (gameOver && deathTimer <= 0) {
    restart();
  }
}

window.addEventListener("keydown", e => {
  if (e.code === "Space") {
    e.preventDefault();
    jump();
  }
});
canvas.addEventListener("click", jump);

/* ============================================================
   SPAWN BLOCS (fixes + mobiles)
============================================================ */
function spawnBlock() {
  const type = Math.random();

  let w = 60 + Math.random() * 80;
  let h = 40 + Math.random() * 60;
  let y = H - 120;

  // escaliers
  if (type < 0.5) {
    y -= Math.floor(Math.random() * 3) * 40;
  }

  const moving = type > 0.7;
  const amp = moving ? 30 + Math.random()*20 : 0;
  const ms = moving ? 0.02 + Math.random()*0.03 : 0;
  const phase = Math.random()*Math.PI*2;

  blocks.push({
    x: W + 50,
    baseY: y,
    y,
    w,
    h,
    moving,
    amp,
    ms,
    phase
  });
}

/* ============================================================
   SPAWN PICS
============================================================ */
function spawnSpike() {
  const size = 40;
  const y = H - 120;
  spikes.push({ x: W + 50, y, size });
}

/* ============================================================
   SPAWN PORTAILS
============================================================ */
function spawnPortal() {
  const type = Math.random() < 0.5 ? "gravity" : "speed";

  portals.push({
    x: W + 50,
    y: H - 180,
    w: 30,
    h: 80,
    type,
    used: false
  });
}

/* ============================================================
   COLLISION BLOCS (mort sur les côtés)
============================================================ */
function resolveBlockCollision(p, b) {
  if (
    p.x < b.x + b.w &&
    p.x + p.size > b.x &&
    p.y < b.y + b.h &&
    p.y + p.size > b.y
  ) {
    const overlapLeft = (p.x + p.size) - b.x;
    const overlapRight = (b.x + b.w) - p.x;
    const overlapTop = (p.y + p.size) - b.y;
    const overlapBottom = (b.y + b.h) - p.y;

    const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

    // atterrissage
    if (minOverlap === overlapTop && p.vy * gravitySign >= 0) {
      p.y = b.y - p.size;
      p.vy = 0;
      p.onGround = true;
    }
    // mort côté gauche
    else if (minOverlap === overlapLeft) {
      triggerDeath();
    }
    // mort côté droit
    else if (minOverlap === overlapRight) {
      triggerDeath();
    }
    // collision par dessous
    else if (minOverlap === overlapBottom) {
      p.y = b.y + b.h;
      p.vy = 2 * gravitySign;
    }
  }
}

/* ============================================================
   COLLISION PICS (mort instantanée)
============================================================ */
function spikeHit(p, s) {
  return (
    p.x < s.x + s.size &&
    p.x + p.size > s.x &&
    p.y < s.y + s.size &&
    p.y + p.size > s.y
  );
}

/* ============================================================
   COLLISION PORTAILS
============================================================ */
function portalHit(p, portal) {
  return (
    p.x < portal.x + portal.w &&
    p.x + p.size > portal.x &&
    p.y < portal.y + portal.h &&
    p.y + p.size > portal.y
  );
}

/* ============================================================
   DEATH ANIMATION
============================================================ */
function triggerDeath() {
  if (gameOver) return;
  gameOver = true;
  deathTimer = 60;
  spawnDeathParticles();
}

function spawnDeathParticles() {
  particles = [];
  for (let i = 0; i < 40; i++) {
    particles.push({
      x: player.x + player.size/2,
      y: player.y + player.size/2,
      vx: (Math.random()*2-1)*6,
      vy: (Math.random()*2-1)*6,
      life: 40 + Math.random()*20
    });
  }
}

/* ============================================================
   RESTART
============================================================ */
function restart() {
  blocks = [];
  spikes = [];
  portals = [];
  particles = [];
  score = 0;
  speed = 4.5;
  gravitySign = 1;
  player.x = 120;
  player.y = H - 120;
  player.vy = 0;
  player.onGround = false;
  player.angle = 0;
  gameOver = false;
  deathTimer = 0;
  requestAnimationFrame(loop);
}

/* ============================================================
   DRAW FUNCTIONS
============================================================ */
function drawPlayer() {
  ctx.save();
  ctx.translate(player.x + player.size/2, player.y + player.size/2);
  ctx.rotate(player.angle);
  ctx.translate(-player.size/2, -player.size/2);

  ctx.fillStyle = "#00eaff";
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, player.size);
  ctx.lineTo(player.size, player.size/2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawBlock(b) {
  ctx.fillStyle = "#ff3c7d";
  ctx.fillRect(b.x, b.y, b.w, b.h);
}

function drawSpike(s) {
  ctx.fillStyle = "#ffdd55";
  ctx.beginPath();
  ctx.moveTo(s.x, s.y + s.size);
  ctx.lineTo(s.x + s.size/2, s.y);
  ctx.lineTo(s.x + s.size, s.y + s.size);
  ctx.closePath();
  ctx.fill();
}

function drawPortal(p) {
  ctx.strokeStyle = p.type === "gravity" ? "#7b5cff" : "#00ff88";
  ctx.lineWidth = 3;
  ctx.strokeRect(p.x, p.y, p.w, p.h);
}

function drawParticles() {
  particles.forEach(pt => {
    ctx.fillStyle = "#00eaff";
    ctx.fillRect(pt.x, pt.y, 4, 4);
  });
}

/* ============================================================
   BACKGROUND
============================================================ */
let bgOffset = 0;
function drawBackground() {
  bgOffset -= speed * 0.2;
  ctx.fillStyle = "#050812";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "#101528";
  for (let i = 0; i < 20; i++) {
    let x = (i * 200 + bgOffset) % (W + 200) - 200;
    ctx.fillRect(x, H - 200, 150, 200);
  }
}

/* ============================================================
   MAIN LOOP
============================================================ */
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (!gameOver) {
    /* --- Physique --- */
    player.vy += gravity * gravitySign;
    player.y += player.vy;
    player.onGround = false;

    /* --- Sol / plafond --- */
    if (gravitySign === 1) {
      if (player.y > H - 120) {
        player.y = H - 120;
        player.vy = 0;
        player.onGround = true;
      }
    } else {
      if (player.y < 60) {
        player.y = 60;
        player.vy = 0;
        player.onGround = true;
      }
    }

    /* --- Rotation du triangle --- */
    if (!player.onGround) {
      player.angle += 0.25 * gravitySign;
    } else {
      player.angle *= 0.8;
    }

    /* --- Spawns --- */
    if (Math.random() < 0.03) spawnBlock();
    if (Math.random() < 0.02) spawnSpike();
    if (Math.random() < 0.005) spawnPortal();

    /* --- Blocs --- */
    blocks.forEach(b => {
      b.x -= speed;
      if (b.moving) {
        b.y = b.baseY + Math.sin(performance.now()*b.ms + b.phase)*b.amp;
      }
      drawBlock(b);
      resolveBlockCollision(player, b);
    });
    blocks = blocks.filter(b => b.x + b.w > 0);

    /* --- Pics --- */
    spikes.forEach(s => {
      s.x -= speed;
      drawSpike(s);
      if (spikeHit(player, s)) triggerDeath();
    });
    spikes = spikes.filter(s => s.x + s.size > 0);

    /* --- Portails --- */
    portals.forEach(p => {
      p.x -= speed;
      drawPortal(p);

      if (!p.used && portalHit(player, p)) {
        p.used = true;

        if (p.type === "gravity") {
          gravitySign *= -1;
          player.vy = 0;
        } else if (p.type === "speed") {
          speed += 1.2; // boost léger
        }
      }
    });
    portals = portals.filter(p => p.x + p.w > 0);

    /* --- Score & vitesse --- */
    score += 0.1;
    speed += 0.0008; // progression très lente
  }

  /* --- Mort --- */
  if (gameOver) {
    deathTimer--;
    particles.forEach(pt => {
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vy += 0.2;
      pt.life--;
    });
    particles = particles.filter(pt => pt.life > 0);

    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "#fff";
    ctx.font = "28px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Mort ! Clique ou Espace pour recommencer", W/2, H/2);
  }

  /* --- Dessins finaux --- */
  if (!gameOver) drawPlayer();
  drawParticles();

  document.getElementById("ui").textContent = "Score : " + Math.floor(score);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
